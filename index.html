<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Bean Clicker</title>
</head>
<body>

<div class="bg-beans" aria-hidden="true">
    <span>🫘</span><span>🫘</span><span>🫘</span>
    <span>🫘</span><span>🫘</span><span>🫘</span>
    <span>🫘</span><span>🫘</span><span>🫘</span>
</div>

<div id="toastContainer" class="toast-container"></div>

<div id="eventBar" style="display:none;" class="event-bar">
    <span class="event-label"></span>
    <div class="event-track"><div class="event-fill"></div></div>
</div>

<div class="ui">

    <!-- LEFT: Shop -->
    <div class="leftbox">
        <div class="sidebar-title">🛒 Shop</div>
        <div class="upgrade-list" id="upgradeList">
            <div id="soilpatch"     class="upgrade-card">🌱 Soil Patch | 1 BPS | 0 Owned | Cost: 5</div>
        </div>
    </div>

    <!-- CENTER: Main -->
    <div class="mainbox">
        <div class="top-bar">
            <div id="levelDisplay" class="level-display">LVL 1</div>
            <div class="ticker-wrap">
                <span id="ticker">BPS: 0</span>
            </div>
        </div>
        <div class="main-inner">
            <div class="bean-count-wrap">
                <div class="bean-count" id="beans">0</div>
                <div class="bean-label">beans</div>
            </div>

            <div class="per-second" id="perSecond">0 per second</div>

            <div class="bean-wrapper">
                <div class="bean-shadow"></div>
                <img class="bean" id="beanpic" src="bean.png" alt="Bean">
            </div>

            <div class="click-hint">tap the bean!</div>
        </div>
    </div>

    <!-- RIGHT: Tabs -->
    <div class="rightbox">
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="achievements" onclick="switchTab('achievements')">🏆 Achv</button>
            <button class="tab-btn" data-tab="prestige" onclick="switchTab('prestige')">🔁 Prestige</button>
            <button class="tab-btn" data-tab="leaderboard" onclick="switchTab('leaderboard')">🌍 Board</button>
        </div>

        <div id="tab-achievements" class="tab-panel active">
            <div class="panel-title">Achievements <span id="achCount" class="ach-count"></span></div>
            <div id="achievementList" class="achievement-list"></div>
        </div>

        <div id="tab-prestige" class="tab-panel">
            <div class="panel-title">Prestige</div>
            <div class="prestige-body">
                <p class="prestige-desc">Reset at <strong>level 250</strong> for a permanent <strong>+10% bean bonus</strong> that stacks every time.</p>
                <div id="prestigeInfo" class="prestige-info">No prestiges yet.</div>
                <button id="prestigeBtn" class="prestige-btn">✦ PRESTIGE</button>
            </div>
        </div>

        <div id="tab-leaderboard" class="tab-panel">
            <div class="panel-title">Leaderboard</div>
            <div class="leaderboard-body">
                <div id="usernameSection" class="username-section">
                    <input id="usernameInput" class="username-input" type="text" placeholder="your name..." maxlength="16">
                    <button class="username-btn" onclick="saveUsername()">GO</button>
                </div>
                <div id="currentUser" class="current-user" style="display:none"></div>
                <button class="refresh-btn" onclick="loadLeaderboard()">↻ Refresh</button>
                <div id="leaderboardList" class="leaderboard-list">
                    <div class="lb-loading">loading...</div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="main.js" type="module"></script>
</body>
</html>
